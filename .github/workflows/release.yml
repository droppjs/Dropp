name: Publish single package to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Typecheck CLI
        run: pnpm --filter @droppjs/cli typecheck

      - name: Validate standalone CLI package
        run: |
          cd packages/cli
          npm pack --dry-run

      - name: Verify npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}
        run: |
          npm whoami
          npm ping

      - name: Publish package (@droppjs/cli)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}
        run: |
          cd packages/cli
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
          npm whoami

          VERSION=$(node -p "require('./package.json').version")
          if npm view "@droppjs/cli@${VERSION}" version >/dev/null 2>&1; then
            echo "@droppjs/cli@${VERSION} is already published. Skipping publish."
            exit 0
          fi

          ATTEMPTS=3
          for attempt in $(seq 1 $ATTEMPTS); do
            echo "Publish attempt ${attempt}/${ATTEMPTS}"
            set +e
            OUTPUT=$(npm publish --access public --provenance 2>&1)
            STATUS=$?
            set -e

            echo "$OUTPUT"

            if [ $STATUS -eq 0 ]; then
              echo "Publish succeeded."
              exit 0
            fi

            if echo "$OUTPUT" | grep -q "E429"; then
              if [ "$attempt" -lt "$ATTEMPTS" ]; then
                SLEEP_SECONDS=$((attempt * 120))
                echo "Rate limited by npm. Retrying in ${SLEEP_SECONDS}s..."
                sleep "$SLEEP_SECONDS"
                continue
              fi
            fi

            echo "Publish failed with a non-retriable error."
            exit $STATUS
          done
